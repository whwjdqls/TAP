# Train MDM (one-stage) on g1_rep_v1 (142-D), LLM2Vec (cached) text.
# Hyperparameters follow kimodo's Bones-SEED MDM recipe (lr 2e-5, bf16, EMA
# 0.995, warmup 1000, CFG text-drop 0.1) with the flat MDM masked-L2 loss
# appropriate for a flat HumanML3D-style rep.

# ----- data -----
data:
  feat_root:  /home/jungbin_cho/seed/g1_rep_v1_feats
  text_index: /home/jungbin_cho/seed/g1_rep_v1_text_full.json
  mean_path:  /home/jungbin_cho/seed/g1_rep_v1_stats/Mean.npy
  std_path:   /home/jungbin_cho/seed/g1_rep_v1_stats/Std.npy
  fps: 20
  window_size: 200
  max_motion_length: 200
  min_motion_len: 24
  unit_length: 4
  clip_normalized: null
  num_workers: 8
  pin_memory: true

# ----- model -----
model_config_path: /home/jungbin_cho/TAP/kinematic_planner/configs/mdm_g1_rep_v1.yaml
stats_path: /home/jungbin_cho/seed/g1_rep_v1_stats
denoiser_fps_override: 20
init_from_safetensors: null

# ----- text encoder (LLM2Vec, cached — no live model loaded) -----
text_encoder:
  type: llm2vec
  cache_path: /home/jungbin_cho/kimodo_caches/bones_seed_llm2vec_small.pt

# ----- training loop (Bones-SEED MDM recipe) -----
trainer:
  output_dir: ${output_dir}
  batch_size: 128
  grad_accum: 1
  num_steps: 200000
  lr: 2.0e-5
  weight_decay: 0.0
  betas: [0.9, 0.999]
  warmup_steps: 1000
  log_every: 50
  print_every: 50
  ckpt_every: 5000
  viz_every: 0
  eval_every: 0
  text_drop_prob: 0.1
  ema_decay: 0.995
  ema_every: 10
  mixed_precision: bf16
  grad_clip: 0.5
  grad_guard_max: 100.0
  resume_from: null
  seed: 0
  phase: text

# ----- visualization (disabled for the first run; positions decode via
#       g1_rep_v1.decode_positions when re-enabled) -----
viz:
  num_frames: 100
  num_denoising_steps: 50
  cfg_scale: 2.5
  prompts:
    - "a person walks forward"
    - "a person waves their right hand"
    - "a person sits down"
  test_vs_gt: false

output_dir: /home/jungbin_cho/TAP/runs/mdm_g1_rep_v1_small
